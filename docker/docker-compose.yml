version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: akdoc_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: akdoc_db
      POSTGRES_USER: akdoc
      POSTGRES_PASSWORD: akdoc_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akdoc -d akdoc_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: akdoc_backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://akdoc:akdoc_pass@db:5432/akdoc_db
      SECRET_KEY: ${SECRET_KEY:-super-secret-key-change-in-production}
      UPLOAD_DIR: /app/uploads
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@akdoc.ai}
    volumes:
      - uploads_data:/app/uploads
      - ../backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: akdoc_frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost:8000/api/v1
    volumes:
      - ../frontend/src:/app/src
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
